[theme]
base = "dark"
primaryColor = "#BFA350"
backgroundColor = "#0A0A0A"
secondaryBackgroundColor = "#141414"
textColor = "#F0EBE0"
font = "sans serif"

[server]
headless = true
enableCORS = false

[browser]
gatherUsageStats = false

[client]
# 本番のエラー画面の伏字を外し、原因特定を可能にする（2026-05-17 障害対応）
showErrorDetails = true
